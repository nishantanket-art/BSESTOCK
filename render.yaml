services:
  # Backend FastAPI Service
  - type: web
    name: bsestock
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # Frontend static site
  - type: static
    name: bsestock-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_API_URL
        value: https://bsestock.onrender.com/api
